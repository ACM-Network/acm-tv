<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <linearGradient id="yuva-lime" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#84CC16" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
  </defs>

  <g transform="translate(10, 10)">
    <!-- Play symbol in triangle box -->
    <polygon points="15,15 95,55 15,95" fill="url(#yuva-lime)" />
    
    <!-- Text: Studio -->
    <text x="115" y="55" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="38" 
          font-weight="900" 
          fill="#FFFFFF">
      Studio
    </text>

    <!-- Text: Yuva -->
    <text x="245" y="55" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="38" 
          font-weight="900" 
          fill="#84CC16">
      Yuva
    </text>

    <!-- Tagline -->
    <text x="118" y="85" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="12" 
          font-weight="700" 
          letter-spacing="5" 
          fill="#9CA3AF">
      YOUTH &amp; ENTERTAINMENT
    </text>
  </g>
</svg>
