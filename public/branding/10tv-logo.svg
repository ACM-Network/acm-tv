<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <linearGradient id="ten-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>
  </defs>

  <g transform="translate(10, 10)">
    <!-- Shield or Circle for 10 -->
    <rect x="15" y="15" width="120" height="80" rx="20" fill="url(#ten-blue)" />
    
    <!-- Text: 10 -->
    <text x="75" y="72" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="54" 
          font-weight="900" 
          text-anchor="middle"
          fill="#FFFFFF">
      10
    </text>

    <!-- Text: TV -->
    <text x="155" y="65" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="48" 
          font-weight="900" 
          fill="#FFFFFF">
      TV
    </text>

    <!-- Text: Telugu / News -->
    <text x="235" y="65" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="40" 
          font-weight="900" 
          letter-spacing="2" 
          fill="#FFFFFF">
      TELUGU
    </text>

    <!-- Tagline -->
    <text x="158" y="88" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="12" 
          font-weight="700" 
          letter-spacing="5" 
          fill="#9CA3AF">
      NEWS LIVE &amp; CLEAR
    </text>
  </g>
</svg>
