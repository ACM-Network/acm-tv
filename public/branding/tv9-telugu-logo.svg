<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <linearGradient id="tv9-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <linearGradient id="tv9-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#B91C1C" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(10, 10)">
    <!-- Box containing "TV" -->
    <rect x="15" y="15" width="80" height="80" rx="10" fill="url(#tv9-blue)" />
    <text x="55" y="67" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="44" 
          font-weight="900" 
          text-anchor="middle"
          fill="#FFFFFF">
      TV
    </text>

    <!-- Box containing "9" -->
    <rect x="100" y="15" width="80" height="80" rx="10" fill="url(#tv9-red)" />
    <text x="140" y="70" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="54" 
          font-weight="900" 
          text-anchor="middle"
          fill="#FFFFFF">
      9
    </text>

    <!-- Text: Telugu -->
    <text x="195" y="65" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="48" 
          font-weight="900" 
          letter-spacing="2" 
          fill="#FFFFFF">
      TELUGU
    </text>

    <!-- Tagline -->
    <text x="198" y="88" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="14" 
          font-weight="700" 
          letter-spacing="5" 
          fill="#9CA3AF">
      FOR A BETTER SOCIETY
    </text>
  </g>
</svg>
