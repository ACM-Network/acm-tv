<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <!-- Cinematic Gold/Amber Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="50%" stop-color="#D97706" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>
    <!-- Glowing Red/Orange Accent Gradient -->
    <linearGradient id="red-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#F97316" />
    </linearGradient>
    <!-- Subtle glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(10, 10)">
    <!-- Shield/Geometric Icon -->
    <path d="M 15 25 L 55 10 L 95 25 L 95 75 L 55 90 L 15 75 Z" 
          fill="none" 
          stroke="url(#gold-grad)" 
          stroke-width="5" 
          stroke-linejoin="round"
          filter="url(#glow)" />
    
    <!-- Outer accent rings -->
    <path d="M 23 28 L 55 16 L 87 28 L 87 72 L 55 84 L 23 72 Z" 
          fill="rgba(0,0,0,0.4)" 
          stroke="url(#red-grad)" 
          stroke-width="2" 
          stroke-linejoin="round" />

    <!-- A-shape in the icon -->
    <path d="M 55 30 L 73 65 M 55 30 L 37 65 M 43 55 L 67 55" 
          stroke="#FFFFFF" 
          stroke-width="5" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- Text: ACM -->
    <text x="120" y="70" 
          font-family="system-ui, -apple-system, 'SF Pro Display', Roboto, sans-serif" 
          font-size="64" 
          font-weight="900" 
          letter-spacing="4" 
          fill="#FFFFFF">
      ACM
    </text>

    <!-- Glowing TV Badge -->
    <rect x="290" y="22" width="90" height="48" rx="8" 
          fill="url(#red-grad)" 
          filter="url(#glow)" />
          
    <text x="335" y="55" 
          font-family="system-ui, -apple-system, 'SF Pro Display', Roboto, sans-serif" 
          font-size="28" 
          font-weight="900" 
          letter-spacing="1" 
          text-anchor="middle"
          fill="#FFFFFF">
      TV
    </text>

    <!-- Subtitle/Tagline -->
    <text x="122" y="92" 
          font-family="system-ui, -apple-system, 'SF Pro Display', Roboto, sans-serif" 
          font-size="14" 
          font-weight="600" 
          letter-spacing="6" 
          fill="#9CA3AF">
      ENTERTAINMENT WITHOUT LIMITS
    </text>
  </g>
</svg>
