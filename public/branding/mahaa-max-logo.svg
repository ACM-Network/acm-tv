<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <linearGradient id="max-crimson" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DC2626" />
      <stop offset="100%" stop-color="#991B1B" />
    </linearGradient>
    <linearGradient id="max-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
  </defs>

  <g transform="translate(10, 10)">
    <!-- Shield shape -->
    <path d="M 15 15 L 115 15 L 95 80 L 15 80 Z" fill="url(#max-crimson)" />
    <text x="55" y="62" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="34" 
          font-weight="900" 
          text-anchor="middle"
          fill="#FFFFFF">
      M
    </text>

    <!-- Text: Mahaa -->
    <text x="135" y="52" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="36" 
          font-weight="900" 
          fill="#FFFFFF">
      MAHAA
    </text>

    <!-- Text: Max -->
    <text x="270" y="52" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="36" 
          font-weight="900" 
          fill="url(#max-gold)">
      MAX
    </text>

    <!-- Tagline -->
    <text x="138" y="80" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="12" 
          font-weight="700" 
          letter-spacing="5" 
          fill="#9CA3AF">
      MAXIMUM ENTERTAINMENT
    </text>
  </g>
</svg>
