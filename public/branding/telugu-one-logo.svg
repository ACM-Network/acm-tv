<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <linearGradient id="t-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
  </defs>

  <g transform="translate(10, 10)">
    <!-- Shape for "One" or "T" -->
    <rect x="15" y="15" width="80" height="80" rx="40" fill="url(#t-gold)" />
    <text x="55" y="70" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="48" 
          font-weight="900" 
          text-anchor="middle"
          fill="#FFFFFF">
      1
    </text>

    <!-- Text: Telugu -->
    <text x="115" y="55" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="38" 
          font-weight="900" 
          fill="#FFFFFF">
      Telugu
    </text>

    <!-- Text: One -->
    <text x="245" y="55" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="38" 
          font-weight="900" 
          fill="#F59E0B">
      One
    </text>

    <!-- Tagline -->
    <text x="118" y="85" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="12" 
          font-weight="700" 
          letter-spacing="5" 
          fill="#9CA3AF">
      ENTERTAINMENT WITHOUT PAUSE
    </text>
  </g>
</svg>
