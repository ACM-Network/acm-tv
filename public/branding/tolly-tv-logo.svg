<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <linearGradient id="tolly-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
  </defs>

  <g transform="translate(10, 10)">
    <!-- Cinematic Filmstrip Icon -->
    <rect x="15" y="15" width="80" height="80" rx="15" fill="url(#tolly-grad)" />
    <!-- White inner play triangle -->
    <polygon points="45,35 75,55 45,75" fill="#FFFFFF" />

    <!-- Text: Tolly -->
    <text x="115" y="55" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="38" 
          font-weight="900" 
          fill="#FFFFFF">
      Tolly
    </text>

    <!-- Text: TV -->
    <text x="220" y="55" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="38" 
          font-weight="900" 
          fill="#EC4899">
      TV
    </text>

    <!-- Tagline -->
    <text x="118" y="85" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="12" 
          font-weight="700" 
          letter-spacing="5" 
          fill="#9CA3AF">
      CINEMA HUB &amp; MUSIC
    </text>
  </g>
</svg>
