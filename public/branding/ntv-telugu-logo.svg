<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <linearGradient id="ntv-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316" />
      <stop offset="100%" stop-color="#EA580C" />
    </linearGradient>
    <linearGradient id="ntv-yellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FACC15" />
      <stop offset="100%" stop-color="#EAB308" />
    </linearGradient>
  </defs>

  <g transform="translate(10, 10)">
    <!-- Main N shape -->
    <path d="M 20 85 L 20 15 L 45 15 L 75 60 L 75 15 L 95 15 L 95 85 L 70 85 L 40 40 L 40 85 Z" fill="url(#ntv-orange)" />
    
    <!-- Accent line below or next to N -->
    <rect x="105" y="15" width="8" height="70" rx="3" fill="url(#ntv-yellow)" />

    <!-- Text: TV -->
    <text x="125" y="65" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="48" 
          font-weight="900" 
          fill="#FFFFFF">
      TV
    </text>

    <!-- Text: Telugu -->
    <text x="195" y="65" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="44" 
          font-weight="900" 
          letter-spacing="2" 
          fill="#FFFFFF">
      TELUGU
    </text>

    <!-- Tagline -->
    <text x="198" y="88" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="12" 
          font-weight="700" 
          letter-spacing="4" 
          fill="#9CA3AF">
      PRATHKSHANAM JANAHITHAM
    </text>
  </g>
</svg>
