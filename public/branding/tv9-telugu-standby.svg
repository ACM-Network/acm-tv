<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <rect width="1920" height="1080" fill="#09090b" />
  
  <defs>
    <!-- Glowing background pattern -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E3A8A" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#09090b" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="tv9-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <linearGradient id="tv9-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#B91C1C" />
    </linearGradient>
  </defs>

  <!-- Ambient Glow -->
  <circle cx="960" cy="540" r="800" fill="url(#glow)" />
  
  <!-- Grid Lines -->
  <path d="M 0 540 L 1920 540 M 960 0 L 960 1080" stroke="rgba(255,255,255,0.03)" stroke-width="2" />
  
  <g transform="translate(710, 390)">
    <!-- Logo -->
    <rect x="0" y="0" width="220" height="220" rx="30" fill="url(#tv9-blue)" />
    <text x="110" y="140" font-family="sans-serif" font-size="110" font-weight="900" text-anchor="middle" fill="#ffffff">TV</text>

    <rect x="250" y="0" width="220" height="220" rx="30" fill="url(#tv9-red)" />
    <text x="360" y="155" font-family="sans-serif" font-size="140" font-weight="900" text-anchor="middle" fill="#ffffff">9</text>
  </g>

  <!-- Station Name & Status -->
  <text x="960" y="700" font-family="sans-serif" font-size="48" font-weight="900" letter-spacing="8" text-anchor="middle" fill="#ffffff">TV9 TELUGU</text>
  <text x="960" y="770" font-family="sans-serif" font-size="24" font-weight="700" letter-spacing="12" text-anchor="middle" fill="#3B82F6">BROADCAST STANDBY</text>
  <text x="960" y="820" font-family="sans-serif" font-size="16" font-weight="500" letter-spacing="4" text-anchor="middle" fill="#71717a">SIGNAL TERMINATED • WILL RESUME SHORTLY</text>
</svg>
